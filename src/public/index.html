<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Little Lemon Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-a"></div>
    <div class="bg-glow bg-glow-b"></div>

    <header class="hero">
      <p class="eyebrow">Little Lemon</p>
      <h1>Restaurant Ops Dashboard</h1>
      <p class="sub">Manage bookings and view customers and menu from one place.</p>
      <div class="hero-actions">
        <button id="refreshBtn" class="btn btn-primary">Refresh Data</button>
        <span id="healthDot" class="health-dot">Checking API...</span>
      </div>
    </header>

    <main class="grid">
      <section class="card card-form reveal">
        <h2>Create Booking</h2>
        <form id="bookingForm" class="form-grid">
          <label>
            Booking Date
            <input type="date" id="booking_date" required />
          </label>

          <label>
            Booking Time
            <input type="time" id="booking_time" required />
          </label>

          <label>
            Table Number
            <input type="number" id="table_number" min="1" required />
          </label>

          <label>
            Number of Guests
            <input type="number" id="number_of_guests" min="1" required />
          </label>

          <label class="wide">
            Customer
            <select id="customer_id" required>
              <option value="">Select customer</option>
            </select>
          </label>

          <button type="submit" class="btn btn-success wide">Save Booking</button>
        </form>
        <p id="formMessage" class="msg"></p>
      </section>

      <section class="card reveal">
        <div class="card-head">
          <h2>Bookings</h2>
          <span id="bookingsCount" class="badge">0</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Time</th>
                <th>Table</th>
                <th>Guests</th>
                <th>Customer</th>
              </tr>
            </thead>
            <tbody id="bookingsBody">
              <tr><td colspan="6">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="card reveal">
        <div class="card-head">
          <h2>Customers</h2>
          <span id="customersCount" class="badge">0</span>
        </div>
        <ul id="customersList" class="list"></ul>
      </section>

      <section class="card reveal">
        <div class="card-head">
          <h2>Menu</h2>
          <span id="menuCount" class="badge">0</span>
        </div>
        <div id="menuGrid" class="menu-grid"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
